name: Weekly News Refresh

on:
  schedule:
    # Friday 18:30 UTC (adjust if you want a different timezone).
    - cron: "30 18 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update News & Insights grid
        run: npm run update:news

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No news changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/SRS_Diamonds_v15.html
          git commit -m "chore: refresh news and insights"
          git push
