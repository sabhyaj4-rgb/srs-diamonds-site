<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS Diamonds | Maintenance</title>
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <link rel="apple-touch-icon" href="/favicon.png?v=2">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1a2e;
      --gold: #c9a961;
      --gold-dark: #8b6f33;
      --text-soft: rgba(255, 255, 255, 0.72);
      --card-bg: rgba(255, 255, 255, 0.045);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(1000px 500px at 12% 8%, rgba(201, 169, 97, 0.08), transparent 55%),
        radial-gradient(800px 450px at 88% 92%, rgba(201, 169, 97, 0.06), transparent 60%),
        linear-gradient(140deg, #121222, #1a1a2e 48%, #11111f);
      font-family: "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    .card {
      width: min(760px, 100%);
      padding: 52px 34px;
      border: 1px solid rgba(201, 169, 97, 0.34);
      border-radius: 4px;
      background: var(--card-bg);
      text-align: center;
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
    }

    .logo {
      width: min(320px, 72%);
      height: auto;
      display: block;
      margin: 0 auto 34px;
      border-radius: 2px;
    }

    h1 {
      margin: 0 0 12px;
      font-weight: 300;
      letter-spacing: 0.02em;
      font-size: clamp(1.7rem, 3.8vw, 2.45rem);
      color: #fff;
    }

    .line {
      width: 88px;
      height: 1px;
      margin: 18px auto 24px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    p {
      margin: 0;
      color: var(--text-soft);
      font-size: 1.02rem;
      line-height: 1.75;
      font-weight: 300;
    }

    .accent {
      color: var(--gold);
      margin-top: 10px;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/favicon.png?v=2" alt="SRS Diamonds">
    <h1>Website Under Maintenance</h1>
    <div class="line"></div>
    <p>Our website is currently undergoing scheduled updates.</p>
    <p class="accent">We will be back online shortly.</p>
  </main>
</body>
</html>
